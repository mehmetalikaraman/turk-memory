<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#534AB7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Türk Memory">
<link rel="manifest" href="manifest.json">
<title>Türk Motifleri Memory</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow-x:hidden;background:#f8f7f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
:root{--bg:#f8f7f4;--card:#ffffff;--card2:#f1efe8;--border:#e0ddd6;--border2:#c8c5bc;--text:#1a1916;--text2:#5f5e5a;--text3:#9a9890;--radius:10px;--radius2:14px;--blue:#185FA5;--green:#3B6D11;--red:#A32D2D;--amber:#BA7517;--purple:#534AB7;}
.screen{padding:1rem;max-width:480px;margin:0 auto;}

/* ── MENÜ ── */
.menu-header{text-align:center;padding:1.25rem 0 1rem;}
.menu-header .logo{font-size:32px;margin-bottom:.3rem;}
.menu-header h1{font-size:20px;font-weight:700;color:var(--text);margin-bottom:.2rem;}
.menu-header p{font-size:13px;color:var(--text2);}
.progress-bar-wrap{background:var(--card2);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.75rem;}
.progress-bar-wrap .pb-label{font-size:12px;color:var(--text2);white-space:nowrap;}
.progress-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--purple);border-radius:4px;transition:width .4s;}
.progress-bar-wrap .pb-count{font-size:12px;font-weight:600;color:var(--purple);}

.tier-section{margin-bottom:1rem;}
.tier-label{font-size:11px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem;padding:0 .1rem;}
.level-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
.lvl-btn{aspect-ratio:1;border-radius:6px;border:1px solid var(--border);background:var(--card2);font-size:9px;font-weight:600;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px;transition:transform .1s;-webkit-user-select:none;user-select:none;}
.lvl-btn:active{transform:scale(.9);}
.lvl-btn.unlocked{background:var(--card);color:var(--text);border-color:var(--border2);}
.lvl-btn.completed{background:#EAF3DE;border-color:#639922;color:#27500A;}
.lvl-btn.locked{opacity:.25;cursor:default;}
.lvl-btn.current{border:2px solid var(--blue);color:var(--blue);background:var(--card);}
.lvl-btn.special{border-width:2px;}
.sp-icon{font-size:12px;line-height:1;}

/* ── TEMA GİRİŞ ── */
.theme-intro{text-align:center;padding:2rem 1rem;}
.theme-intro .ti-icon{font-size:56px;margin-bottom:.75rem;}
.theme-intro .ti-badge{display:inline-block;padding:4px 16px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:.75rem;}
.theme-intro h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:.4rem;}
.theme-intro p{font-size:14px;color:var(--text2);margin-bottom:1.5rem;}
.theme-intro .start-btn{padding:14px 40px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;border:none;color:#fff;letter-spacing:.02em;}

/* ── OYUN ── */
.game-wrap{padding:.65rem;}
.topbar{display:flex;align-items:center;gap:5px;margin-bottom:.5rem;flex-wrap:wrap;}
.tb-btn{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;}
.tb-stat{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 9px;font-size:11px;color:var(--text2);white-space:nowrap;}
.tb-stat b{color:var(--text);}
.tb-theme{border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;}
.tb-hint{border-radius:8px;padding:5px 11px;font-size:11px;font-weight:700;background:#E6F1FB;color:#0C447C;border:1px solid #85B7EB;cursor:pointer;}
.tb-hint:disabled{opacity:.4;cursor:default;background:var(--card2);color:var(--text3);border-color:var(--border);}
.layer-dots{display:flex;gap:3px;align-items:center;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:5px 8px;}
.ld{width:9px;height:9px;border-radius:2px;border:1px solid var(--border2);}
.ld.active{background:#EF9F27;border-color:#BA7517;}
.ld.done{background:#639922;border-color:#3B6D11;}

.msg-bar{text-align:center;font-size:13px;color:var(--text2);min-height:20px;margin-bottom:.4rem;font-weight:500;}
.msg-bar.ok{color:var(--green);}
.msg-bar.no{color:var(--red);}

.card-grid{display:grid;}
.card-slot{position:relative;aspect-ratio:1;}
.card-stack{position:relative;width:100%;height:100%;}
.card-wrap{position:absolute;width:100%;height:100%;cursor:pointer;}
.card-wrap.locked-card{cursor:not-allowed;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .36s cubic-bezier(.4,0,.2,1);}
.card-wrap.flipped .card-inner,.card-wrap.matched .card-inner{transform:rotateY(180deg);}
@keyframes vanish{0%{transform:rotateY(180deg) scale(1);opacity:1;}50%{transform:rotateY(180deg) scale(1.16);opacity:1;}100%{transform:rotateY(180deg) scale(0);opacity:0;}}
.card-wrap.vanishing .card-inner{animation:vanish .36s ease forwards;}
@keyframes shake{0%{transform:translateX(0);}20%{transform:translateX(-5px);}40%{transform:translateX(5px);}60%{transform:translateX(-4px);}80%{transform:translateX(4px);}100%{transform:translateX(0);}}
.card-wrap.shaking{animation:shake .38s ease;}
@keyframes hintPulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.card-wrap.hint-glow .c-front{animation:hintPulse .45s ease infinite;}
@keyframes reveal{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.layer-reveal{animation:reveal .3s ease;}
.c-front,.c-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.c-front{
  background:linear-gradient(135deg,#6e68d4 0%,#534AB7 40%,#3d35a0 70%,#2a2480 100%);
  border:1.5px solid rgba(255,255,255,0.25);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.35),inset 0 -1px 0 rgba(0,0,0,0.2),0 4px 12px rgba(83,74,183,0.4);
  position:relative;
}
.c-front::before{
  content:'';position:absolute;inset:0;border-radius:10px;
  background:radial-gradient(ellipse at 35% 30%,rgba(255,255,255,0.22) 0%,transparent 60%);
  pointer-events:none;
}
.c-front::after{
  content:'✦';position:absolute;
  font-size:clamp(10px,2.5vw,20px);color:rgba(255,255,255,0.3);
  text-shadow:0 0 8px rgba(255,255,255,0.5);
}
.c-back{transform:rotateY(180deg);padding:2px;}
.card-wrap.matched .c-back{border:2px solid #639922 !important;background:#EAF3DE !important;border-radius:9px;}

/* ── KAZANMA ── */
.win-screen{text-align:center;padding:1.5rem 1rem;position:relative;}
.win-screen h2{font-size:21px;font-weight:700;margin-bottom:.3rem;}
.win-screen p{font-size:13px;color:var(--text2);margin-bottom:1rem;}
.win-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.wst{background:var(--card2);border-radius:10px;padding:.75rem .5rem;text-align:center;}
.wst .wl{font-size:10px;color:var(--text3);}
.wst .wv{font-size:20px;font-weight:700;color:var(--text);}
.btn-row{display:flex;gap:8px;}
.btn-row button{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:var(--card);color:var(--text);transition:all .15s;}
.btn-row button:active{transform:scale(.97);}
.btn-row .primary{color:#fff;border:none;}

/* ── KONFETİ ── */
.confetti-container{position:absolute;top:0;left:0;width:100%;height:200px;pointer-events:none;overflow:hidden;}
.cp{position:absolute;width:7px;height:7px;border-radius:2px;opacity:0;}
@keyframes cf{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(200px) rotate(720deg);opacity:0;}}
@keyframes screenIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.anim-in{animation:screenIn .25s ease forwards;}
</style>
</head>
<body>

</div>

// ═══════════ LEVEL KONFİG ═══════════
function getLevelConfig(lvl){
  let cols,rows,pairs,hints,layers;
  if(lvl<=3){cols=2;rows=2;pairs=2;layers=1;}
  else if(lvl<=8){cols=4;rows=2;pairs=4;layers=1;}
  else if(lvl<=20){cols=4;rows=4;pairs=8;layers=1;}
  else if(lvl<=60){cols=4;rows=4;pairs=8;layers=2;}
  else if(lvl<=150){cols=5;rows=4;pairs=10;layers=2;}
  else if(lvl<=300){cols=6;rows=4;pairs=12;layers=3;}
  else if(lvl<=500){cols=6;rows=6;pairs=18;layers=3;}
  else if(lvl<=750){cols=8;rows=4;pairs=16;layers=3;}
  else if(lvl<=1100){cols=8;rows=6;pairs=24;layers=4;}
  else{cols=10;rows=5;pairs=25;layers=5;}
  if(lvl<=3)hints=0;else if(lvl<=20)hints=3;else if(lvl<=150)hints=2;else hints=3;
  return{cols,rows,pairs,hints,layers};
}

  if(lvl%60===0){showIntro(lvl,th);}else{playLevel(lvl,th);}
}

// ═══════════ OYUN ═══════════
function playLevel(lvl,th){
  if(!th)th=getTheme(lvl);
  const cfg=getLevelConfig(lvl);
  const pool=MOTIF_SETS[th.key]||MOTIF_SETS.turk;
  const shuffled=[...pool].sort(()=>Math.random()-.5).slice(0,cfg.pairs);
  const totalSlots=cfg.cols*cfg.rows;
  let allCards=[];
  for(let l=0;l<cfg.layers;l++){
    [...shuffled,...shuffled].sort(()=>Math.random()-.5).forEach(m=>allCards.push({...m,uid:Math.random().toString(36).slice(2)}));
  }
  const slots=[];
  for(let i=0;i<totalSlots;i++)slots.push([]);
  allCards.forEach((c,i)=>slots[i%totalSlots].push(c));
  slots.forEach(s=>s.sort(()=>Math.random()-.5));
  gs={lvl,cfg,th,slots,flipped:[],matched:0,totalPairs:cfg.pairs*cfg.layers,moves:0,hints:cfg.hints,lock:false};
  renderGame();
}

function renderGame(){
  const g=gs;
  ['menu-screen','intro-screen'].forEach(id=>document.getElementById(id).style.display='none');
  const el=document.getElementById('game-screen');
  el.style.display='block';
  const gap=g.cfg.cols>=8?3:g.cfg.cols>=6?4:5;
  const layPips=g.cfg.layers>1?`<div class="layer-dots">${Array(g.cfg.layers).fill(0).map((_,i)=>`<div class="ld${i===g.cfg.layers-1?' active':''}" id="lp${i}"></div>`).join('')}</div>`:'';
  el.innerHTML=`<div class="game-wrap anim-in">
    <div class="topbar">
      <button class="tb-btn" onclick="showMenu()">← Menü</button>
      <div class="tb-theme" style="background:${g.th.bg};color:${g.th.color};">${g.th.icon} ${g.th.name}</div>
      ${layPips}
      <div class="tb-stat">Hamle <b id="mv">0</b></div>
      <div class="tb-stat"><b id="mc">0</b>/${g.totalPairs}</div>
      <button class="tb-hint" id="hb" onclick="doHint()" ${g.cfg.hints===0?'disabled':''}>İpucu <span id="hc">${g.cfg.hints}</span></button>
    </div>
    <div class="msg-bar" id="msg">${g.cfg.layers>1?'Üstteki kartları önce eşleştir!':'Kartları eşleştir!'}</div>
    <div class="card-grid" id="cg" style="grid-template-columns:repeat(${g.cfg.cols},1fr);gap:${gap}px;"></div>
  </div>`;
  buildSlots();
}

];
function layerFront(li){return LAYER_FRONTS[Math.min(li,LAYER_FRONTS.length-1)];}

function makeCardEl(card, li, totalLayers, si, isTop, isFlipped){
  const lf = layerFront(li);
  const ox = li*-3, oy = li*-4;
  const w = document.createElement('div');
  w.className = `card-wrap${!isTop ? ' locked-card' : ''}`;
  w.dataset.si = si; w.dataset.uid = card.uid; w.dataset.li = li;
  w.style.cssText = `position:absolute;width:100%;height:100%;transform:translate(${ox}px,${oy}px);z-index:${(li+1)*10};`;
  w.innerHTML = `<div class="card-inner">
    <div class="c-front" style="
      background:${lf.grad};
      border:1.5px solid ${lf.border};
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.3),inset 0 -1px 0 rgba(0,0,0,0.25),0 4px 14px ${lf.shadow};
      position:relative;
    ">
      <div style="position:absolute;inset:0;border-radius:10px;background:${lf.shine};pointer-events:none;"></div>
      <span style="position:absolute;font-size:clamp(10px,2.5vw,20px);color:${lf.iconColor};text-shadow:0 0 8px ${lf.iconColor};">${lf.icon}</span>
    </div>
    <div class="c-back" style="background:${card.bg};border:1.5px solid ${card.bg};">${card.svg}</div>
  </div>`;
  if(isTop) w.addEventListener('click', () => flipAny(si, card.uid, li, w));
  return w;
}

function buildSlots(){
  const g=gs, cg=document.getElementById('cg');
  cg.innerHTML='';
  g.slots.forEach((stack,si)=>{
    const slot=document.createElement('div');
    slot.className='card-slot';
    const se=document.createElement('div');
    se.className='card-stack';
    const topLi = stack.length-1;
    stack.forEach((card,li)=>{
      const isTop = li===topLi;
      const w = makeCardEl(card, li, stack.length, si, isTop, false);
      se.appendChild(w);
    });
    slot.appendChild(se);
    cg.appendChild(slot);
  });
}

function getTop(si){const s=gs.slots[si];return s&&s.length?s[s.length-1]:null;}

function flipAny(si,uid,li,el){
  const g=gs;
  if(g.lock||el.classList.contains('flipped'))return;
  const stack=g.slots[si];
  const card=stack[li];
  if(!card||card.uid!==uid)return;
  el.classList.add('flipped');el.classList.remove('hint-glow');
  g.flipped.push({si,uid,li,el,card});
  if(g.flipped.length===2){
    g.lock=true;g.moves++;
    document.getElementById('mv').textContent=g.moves;
    const[a,b]=g.flipped;
    if(a.card.id===b.card.id){
      g.matched++;document.getElementById('mc').textContent=g.matched;
      setMsg('Eşleşti! ✓','ok');
      setTimeout(()=>{
        a.el.classList.add('vanishing');b.el.classList.add('vanishing');
        setTimeout(()=>{
          remCard(a.si,a.uid);remCard(b.si,b.uid);
          rebSlot(a.si);rebSlot(b.si);
          g.flipped=[];g.lock=false;
          if(g.matched===g.totalPairs)setTimeout(showWin,350);
          else setMsg(g.cfg.layers>1?'Kartları eşleştir!':'Kartları eşleştir!','');
        },360);
      },500);
    } else {
      setMsg('Eşleşmedi!','no');
      setTimeout(()=>{
        a.el.classList.add('shaking');b.el.classList.add('shaking');
        setTimeout(()=>{
          a.el.classList.remove('flipped','shaking');b.el.classList.remove('flipped','shaking');
          g.flipped=[];g.lock=false;
          setMsg(g.cfg.layers>1?'Kartları eşleştir!':'Kartları eşleştir!','');
        },380);
      },150);
    }
  }
}
function setMsg(t,c){const m=document.getElementById('msg');m.textContent=t;m.className='msg-bar'+(c?' '+c:'');}
function remCard(si,uid){const s=gs.slots[si];const i=s.findIndex(c=>c.uid===uid);if(i>=0)s.splice(i,1);}
function rebSlot(si){
  const cg=document.getElementById('cg');if(!cg)return;
  const slotEl=cg.querySelectorAll('.card-slot')[si];if(!slotEl)return;
  const se=slotEl.querySelector('.card-stack');se.innerHTML='';
  const stack=gs.slots[si];
  const topLi=stack.length-1;
  stack.forEach((card,li)=>{
    const isTop=li===topLi;
    const w=makeCardEl(card,li,stack.length,si,isTop,false);
    if(isTop&&stack.length<gs.cfg.layers)w.classList.add('layer-reveal');
    se.appendChild(w);
  });
  });
}

function doHint(){
  const g=gs;if(g.hints<=0||g.lock)return;
  const avail=[];
  document.querySelectorAll('.card-wrap:not(.locked-card):not(.flipped)').forEach(e=>avail.push(e));
  if(avail.length<2)return;
  g.hints--;document.getElementById('hc').textContent=g.hints;
  if(g.hints===0)document.getElementById('hb').disabled=true;
  const map={};
  avail.forEach(e=>{const c=getTop(parseInt(e.dataset.si));if(c){if(!map[c.id])map[c.id]=[];map[c.id].push(e);}});
  const pairs=Object.values(map).filter(v=>v.length>=2);if(!pairs.length)return;
  const pick=pairs[Math.floor(Math.random()*pairs.length)];
  pick[0].classList.add('hint-glow');pick[1].classList.add('hint-glow');
  setTimeout(()=>{pick[0].classList.remove('hint-glow');pick[1].classList.remove('hint-glow');},1500);
}

function spawnConfetti(){
  const cc=document.getElementById('cc');if(!cc)return;
  const cols=[gs.th.color,'#EF9F27','#639922','#D4537E','#378ADD','#E24B4A'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');p.className='cp';
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};animation:cf ${.5+Math.random()*.9}s ${Math.random()*.4}s ease forwards;`;
    cc.appendChild(p);
  }
  setTimeout(()=>{if(cc)cc.innerHTML='';},2500);
}

function showWin(){
  const g=gs;
  if(!sv.done.includes(g.lvl))sv.done.push(g.lvl);
  if(g.lvl>=sv.max)sv.max=g.lvl+1;
  saveSv(sv);
  const stars=g.moves<=g.totalPairs+3?3:g.moves<=g.totalPairs*2?2:1;
  const isLast=g.lvl===1500;
  const nextTh=!isLast?getTheme(g.lvl+1):null;
  document.getElementById('game-screen').innerHTML=`<div class="screen anim-in"><div class="win-screen">
    <div class="confetti-container" id="cc"></div>
    <div style="font-size:30px;margin-bottom:.3rem">${'⭐'.repeat(stars)}</div>
    <div style="font-size:26px;margin-bottom:.3rem">${g.th.icon}</div>
    <h2>Seviye ${g.lvl} Tamamlandı!</h2>
    <p>${isLast?'Tüm 1500 seviyeyi bitirdin! Türk Hafıza Grandmasterisin!':(!isLast&&(g.lvl+1)%60===0?`Sırada: ${nextTh.icon} ${nextTh.name} teması!`:'Harika gidiyorsun!')}</p>
    <div class="win-stats">
      <div class="wst"><div class="wl">Hamle</div><div class="wv">${g.moves}</div></div>
      <div class="wst"><div class="wl">Çift</div><div class="wv">${g.matched}</div></div>
      <div class="wst"><div class="wl">Yıldız</div><div class="wv">${stars}/3</div></div>
    </div>
    <div class="btn-row">
      <button onclick="showMenu()">Menü</button>
      <button onclick="playLevel(${g.lvl},getTheme(${g.lvl}))">Tekrar</button>
      ${!isLast?`<button class="primary" onclick="startLevel(${g.lvl+1})" style="background:${nextTh.color};">Devam →</button>`:''}
    </div>
  </div></div>`;
  setTimeout(spawnConfetti,100);
}

// ═══════════ SERVICE WORKER KAYIT ═══════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

showMenu();
</script>
